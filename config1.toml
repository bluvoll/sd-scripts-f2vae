[additional_network_arguments]
learning_rate      = 3.5e-5 #2.5e-5 general.
train_text_encoder = false
text_encoder_lr    = 5e-5


[optimizer_arguments]
lr_scheduler       = "constant_with_warmup"
optimizer_type     = "AdamW8kahan"
optimizer_args     = ["weight_decay=0.01"]
min_lr             = 0

[training_arguments]
max_train_epochs    = 1
protected_tags_file = "cleaned.txt"
loss_type          = "l2"
save_every_n_epochs = 1
save_every_n_steps = 1600
save_last_n_epochs  = 10
train_batch_size   = 36
max_grad_norm      = 1
weighted_captions  = false
seed               = 27463286
max_token_length   = 225
lowram             = false
max_data_loader_n_workers = 16
persistent_data_loader_workers = true
save_precision     = "bf16"
mixed_precision    = "bf16"
#full_bf16          = true
output_dir         = "/workspace/0.3-final/"
output_name        = "Chenkin-RF-0.3-experimental-Blu"


[model_arguments]
pretrained_model_name_or_path = "/workspace/Chenkin-RF-0.3-Final-000001.safetensors"
#vae="/home/bluvoll/custom-kohya/sd-scripts/tools/black-forest-labs/FLUX.2-dev" #OwO
v2                    = false
sdxl                  = true
gradient_checkpointing = true
gradient_accumulation_steps = 4
sdpa                  = false
xformers              = true
#logging_dir ="logs"
#log_with = "wandb"
#wandb_run_name = "Chenkin-RF-0.3"
[saving_arguments]
save_model_as = "safetensors"


[dataset_arguments]
cache_latents              = true
cache_latents_to_disk      = true
lr_warmup_steps            = 120

edm2_loss_weighting = true
edm2_loss_weighting_optimizer = "torch.optim.AdamW"
edm2_loss_weighting_optimizer_lr = "7e-3"
edm2_loss_weighting_optimizer_args = "{'weight_decay':5e-3}"
edm2_loss_weighting_lr_scheduler = true
edm2_loss_weighting_lr_scheduler_warmup_percent = 0.1
edm2_loss_weighting_lr_scheduler_constant_percent = 0.9
edm2_loss_weighting_generate_graph = true
edm2_loss_weighting_generate_graph_output_dir = "/workspace/bluvoll/edm2tests"
edm2_loss_weighting_generate_graph_every_x_steps = 10
edm2_loss_weighting_generate_graph_y_limit = 40
edm2_loss_weighting_initial_weights = ""
edm2_loss_weighting_num_channels = 448